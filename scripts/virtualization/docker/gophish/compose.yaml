services:
  gophish:
    image: gophish/gophish:latest
    container_name: gophish
    restart: unless-stopped
    ports:
      - "3333:3333"   # Admin panel (HTTPS)
      - "8080:80"     # Phishing listener (HTTP)
      - "8443:443"    # Phishing listener (HTTPS)
    volumes:
      - ./config.json:/opt/gophish/config.json:ro
      - ./data:/opt/gophish/data
      - ./ssl:/opt/gophish/ssl
    environment:
      - ADMIN_USE_TLS=true
